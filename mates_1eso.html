<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matemàtiques 1r ESO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap');
:root{--bg:#f0f4ff;--surface:#fff;--surface2:#f7f9ff;--border:#e2e8f8;--text:#1a1f3a;--text2:#5a6180;--accent:#4f6ef7;--accent-light:#eef1ff;--green:#22c55e;--green-light:#dcfce7;--red:#ef4444;--purple:#8b5cf6;--radius:14px;--shadow:0 2px 12px rgba(79,110,247,.08);--shadow-lg:0 8px 32px rgba(79,110,247,.13);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{display:flex;min-height:100vh;}
.sidebar{width:280px;min-width:280px;background:var(--surface);border-right:1.5px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow:hidden;}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#4f6ef7,#7c3aed);color:#fff;}
.sidebar-header h1{font-family:Nunito,sans-serif;font-size:18px;font-weight:900;line-height:1.2;}
.sidebar-header p{font-size:12px;opacity:.8;margin-top:4px;}
.progress-bar-wrap{background:rgba(255,255,255,.2);border-radius:8px;height:6px;margin-top:12px;overflow:hidden;}
.progress-bar-fill{background:#fff;height:100%;border-radius:8px;transition:width .4s;}
.progress-text{font-size:11px;opacity:.85;margin-top:6px;}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0;}
.unit-item{margin:2px 10px;}
.unit-btn{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:10px 12px;border-radius:10px;display:flex;align-items:center;gap:10px;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;color:var(--text2);transition:all .15s;}
.unit-btn:hover,.unit-btn.active{background:var(--accent-light);color:var(--accent);}
.unit-btn.done{color:var(--green);}
.unit-num{width:26px;height:26px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;transition:all .15s;}
.unit-btn.active .unit-num{background:var(--accent);color:#fff;}
.unit-btn.done .unit-num{background:var(--green-light);color:var(--green);}
.unit-progress{margin-left:auto;font-size:10px;color:var(--text2);font-weight:600;}
.subnav{display:none;padding:2px 10px 4px 48px;}
.subnav.open{display:block;}
.sub-btn{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:6px 10px;border-radius:8px;font-size:12px;color:var(--text2);font-family:'Nunito Sans',sans-serif;display:flex;align-items:center;gap:8px;transition:all .15s;}
.sub-btn:hover,.sub-btn.active{background:var(--accent-light);color:var(--accent);}
.sub-btn.done{color:var(--green);}
.sub-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:all .15s;}
.sub-btn.active .sub-dot{background:var(--accent);}
.sub-btn.done .sub-dot{background:var(--green);}
.main{flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.topbar-title{font-family:Nunito,sans-serif;font-size:16px;font-weight:800;color:var(--accent);cursor:pointer;}
.done-btn{margin-left:auto;padding:8px 18px;border-radius:10px;background:var(--green-light);color:var(--green);border:none;cursor:pointer;font-family:Nunito,sans-serif;font-weight:700;font-size:13px;display:none;align-items:center;gap:6px;transition:all .15s;}
.done-btn:hover,.done-btn.marked{background:var(--green);color:#fff;}
.content{flex:1;overflow-y:auto;padding:32px;}
.home{max-width:800px;margin:0 auto;}
.home-hero{background:linear-gradient(135deg,#4f6ef7,#7c3aed);border-radius:20px;padding:36px;color:#fff;margin-bottom:28px;}
.home-hero h2{font-family:Nunito,sans-serif;font-size:28px;font-weight:900;margin-bottom:8px;}
.home-hero p{opacity:.85;font-size:15px;line-height:1.6;}
.home-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px;}
.stat{background:rgba(255,255,255,.15);border-radius:12px;padding:14px;text-align:center;}
.stat-num{font-family:Nunito,sans-serif;font-size:28px;font-weight:900;}
.stat-label{font-size:12px;opacity:.8;margin-top:2px;}
.units-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.unit-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:14px;}
.unit-card:hover{border-color:var(--accent);box-shadow:var(--shadow-lg);transform:translateY(-2px);}
.unit-card-num{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:Nunito,sans-serif;font-size:15px;font-weight:900;flex-shrink:0;}
.unit-card-body{flex:1;}
.unit-card-title{font-family:Nunito,sans-serif;font-size:14px;font-weight:800;margin-bottom:4px;}
.unit-card-sub{font-size:11px;color:var(--text2);}
.unit-card-progress{font-size:11px;font-weight:700;margin-top:6px;}
.mini-bar{height:4px;background:var(--border);border-radius:4px;margin-top:4px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:4px;transition:width .4s;}
.lesson-container{max-width:780px;margin:0 auto;}
.lesson-header{margin-bottom:24px;}
.lesson-tag{display:inline-block;background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:8px;font-family:Nunito,sans-serif;text-transform:uppercase;letter-spacing:.04em;}
.lesson-title{font-family:Nunito,sans-serif;font-size:24px;font-weight:900;color:var(--text);}
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.tab{padding:8px 18px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;font-family:Nunito,sans-serif;font-weight:700;color:var(--text2);transition:all .15s;}
.tab:hover{border-color:var(--accent);color:var(--accent);}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.panel{display:none;}.panel.active{display:block;}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.card-title{font-family:Nunito,sans-serif;font-size:15px;font-weight:800;margin-bottom:10px;color:var(--text);}
.tip{font-size:13px;color:var(--text2);border-left:3px solid var(--accent);padding:8px 12px;border-radius:0 8px 8px 0;background:var(--accent-light);margin-top:10px;line-height:1.6;}
.formula-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;font-family:Nunito,sans-serif;font-size:1.2rem;font-weight:700;margin:10px 0;}
.ex{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;margin:8px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ex-q{font-size:15px;flex:1;min-width:160px;}
.ex-inp{width:90px;font-size:14px;text-align:center;padding:6px;border:1.5px solid var(--border);border-radius:8px;font-family:'Nunito Sans',sans-serif;}
.ex-inp:focus{outline:none;border-color:var(--accent);}
.check-btn{padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-family:Nunito,sans-serif;font-weight:700;font-size:13px;color:var(--text);transition:all .15s;}
.check-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.fb-ok{color:var(--green);font-size:13px;font-weight:700;}
.fb-wrong{color:var(--red);font-size:13px;font-weight:700;}
.hint-link{font-size:12px;color:var(--accent);cursor:pointer;text-decoration:underline;}
.yn-btn{padding:6px 20px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-family:Nunito,sans-serif;font-weight:700;font-size:14px;transition:all .15s;}
.yn-btn:hover{background:var(--accent-light);border-color:var(--accent);}
.yn-ok{background:var(--green-light)!important;border-color:var(--green)!important;color:var(--green)!important;}
.yn-wrong{background:#fee2e2!important;border-color:var(--red)!important;color:var(--red)!important;}
.new-btn{margin-top:14px;padding:9px 20px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-family:Nunito,sans-serif;font-weight:700;font-size:13px;color:var(--text2);transition:all .15s;}
.new-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent);}
.progress-line{font-size:13px;color:var(--text2);margin-top:12px;font-weight:600;}
.level-tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px;font-family:Nunito,sans-serif;}
.lv1{background:#e0f2fe;color:#0369a1;}.lv2{background:#ede9fe;color:#6d28d9;}.lv3{background:#fee2e2;color:#b91c1c;}
sup{font-size:.65em;vertical-align:super;}
.coming-soon{text-align:center;padding:60px 20px;color:var(--text2);}
.coming-soon .icon{font-size:48px;margin-bottom:16px;}
.coming-soon h3{font-family:Nunito,sans-serif;font-size:20px;font-weight:800;color:var(--text);margin-bottom:8px;}
.coming-soon p{font-size:14px;line-height:1.6;}
.u1{background:#eef1ff;color:#4f6ef7;}.u2{background:#fce7f3;color:#db2777;}.u3{background:#fef3c7;color:#d97706;}.u4{background:#dcfce7;color:#16a34a;}.u5{background:#f5f3ff;color:#7c3aed;}.u6{background:#fff7ed;color:#ea580c;}.u7{background:#e0f2fe;color:#0284c7;}.u8{background:#fdf2f8;color:#a21caf;}.u9{background:#f0fdf4;color:#15803d;}.u10{background:#fff1f2;color:#be123c;}.u11{background:#f0f9ff;color:#0369a1;}.u12{background:#f7fee7;color:#4d7c0f;}
.slider{width:100%;margin:8px 0;}
.slider-row{display:flex;align-items:center;gap:12px;margin:10px 0;}
.slider-val{font-family:Nunito,sans-serif;font-weight:800;font-size:1.1rem;min-width:32px;color:var(--accent);}
.num-line{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0;}
.nl-box{padding:5px 12px;border-radius:8px;font-weight:700;font-size:14px;font-family:Nunito,sans-serif;}
.nl-pos{background:#eef1ff;color:#4f6ef7;}.nl-neg{background:#fee2e2;color:#ef4444;}.nl-zero{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
@media(max-width:700px){.sidebar{width:240px;min-width:240px;}.units-grid{grid-template-columns:1fr;}.content{padding:16px;}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>📐 Mates 1r ESO</h1>
    <p>Curs complet interactiu</p>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="global-bar" style="width:0%"></div></div>
    <div class="progress-text" id="global-text">0 / 78 apartats completats</div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
</aside>
<main class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbar-info" onclick="goHome()">📐 Matemàtiques 1r ESO</span>
    <button class="done-btn" id="done-btn" onclick="toggleDone()">☑ Marcar com a fet</button>
  </div>
  <div class="content" id="content"></div>
</main>
</div>
<script>
const CURRICULUM=[
  {id:1,title:'Divisibilitat',color:'u1',icon:'🔢',units:[
    {id:'1-1',title:'Potències. Operacions amb potències'},
    {id:'1-2',title:'Divisibilitat de nombres naturals'},
    {id:'1-3',title:"Múltiples d'un nombre"},
    {id:'1-4',title:"Divisors d'un nombre"},
    {id:'1-5',title:'Nombres primers i compostos'},
    {id:'1-6',title:'Descomposició en factors'},
    {id:'1-7',title:'Màxim comú divisor'},
    {id:'1-8',title:'Mínim comú múltiple'},
  ]},
  {id:2,title:'Nombres enters',color:'u2',icon:'➖',units:[
    {id:'2-1',title:'Nombres enters'},
    {id:'2-2',title:'Comparació de nombres enters'},
    {id:'2-3',title:'Suma i resta de dos nombres enters'},
    {id:'2-4',title:'Suma i resta de diversos nombres enters'},
    {id:'2-5',title:'Multiplicació i divisió de nombres enters'},
    {id:'2-6',title:'Potències de nombres enters'},
    {id:'2-7',title:'Arrel quadrada de nombres enters'},
    {id:'2-8',title:'Operacions combinades de nombres enters'},
  ]},
  {id:3,title:'Fraccions',color:'u3',icon:'½',units:[
    {id:'3-1',title:'Fraccions'},{id:'3-2',title:'Fraccions pròpies i impròpies'},
    {id:'3-3',title:'Fraccions equivalents'},{id:'3-4',title:'Comparació de fraccions'},
    {id:'3-5',title:'Suma i resta de fraccions'},{id:'3-6',title:'Multiplicació de fraccions'},
    {id:'3-7',title:'Divisió de fraccions'},{id:'3-8',title:'Operacions combinades amb fraccions'},
  ]},
  {id:4,title:'Nombres decimals',color:'u4',icon:'0,5',units:[
    {id:'4-1',title:'Nombres decimals'},{id:'4-2',title:'Comparació de nombres decimals'},
    {id:'4-3',title:'Aproximació de nombres decimals'},{id:'4-4',title:'Multiplicació i divisió per la unitat seguida de zeros'},
    {id:'4-5',title:'Suma, resta i multiplicació de nombres decimals'},{id:'4-6',title:'Divisió de nombres decimals'},
    {id:'4-7',title:"Expressió d'una fracció com a nombre decimal"},{id:'4-8',title:'Classificació de nombres decimals'},
  ]},
  {id:5,title:'Àlgebra',color:'u5',icon:'x',units:[
    {id:'5-1',title:'Expressions algebraiques'},{id:'5-2',title:'Monomis'},
    {id:'5-3',title:'Polinomis. Operacions'},{id:'5-4',title:'Equacions'},
    {id:'5-5',title:"Elements d'una equació"},{id:'5-6',title:'Equacions equivalents'},
    {id:'5-7',title:'Resolució d\'equacions de primer grau'},{id:'5-8',title:'Resolució de problemes amb equacions'},
  ]},
  {id:6,title:'Proporcionalitat i percentatges',color:'u6',icon:'%',units:[
    {id:'6-1',title:'Raó i proporció'},{id:'6-2',title:'Magnituds directament proporcionals'},
    {id:'6-3',title:'Problemes de proporcionalitat directa'},{id:'6-4',title:'Repartiments directament proporcionals'},
    {id:'6-5',title:'Percentatges'},{id:'6-6',title:'Problemes amb percentatges'},
    {id:'6-7',title:'Augments i disminucions percentuals'},
  ]},
  {id:7,title:'Rectes i angles',color:'u7',icon:'📏',units:[
    {id:'7-1',title:'Rectes'},{id:'7-2',title:'Semirectes i segments'},
    {id:'7-3',title:'Angles'},{id:'7-4',title:"Posicions relatives d'angles"},
    {id:'7-5',title:'Polígons'},{id:'7-6',title:'Angles en els polígons'},
  ]},
  {id:8,title:'Triangles',color:'u8',icon:'△',units:[
    {id:'8-1',title:'Triangles'},{id:'8-2',title:"Relacions entre els elements d'un triangle"},
    {id:'8-3',title:'Rectes i punts notables en el triangle'},{id:'8-4',title:'Teorema de Pitàgores'},
  ]},
  {id:9,title:'Quadrilàters i circumferència',color:'u9',icon:'⬜',units:[
    {id:'9-1',title:'Quadrilàters'},{id:'9-2',title:'Propietats dels paral·lelograms'},
    {id:'9-3',title:'Polígons regulars'},{id:'9-4',title:'Circumferència'},
    {id:'9-5',title:'Posicions relatives de la circumferència'},{id:'9-6',title:'Cercle'},
  ]},
  {id:10,title:'Perímetres i àrees',color:'u10',icon:'📐',units:[
    {id:'10-1',title:"Perímetre d'un polígon"},{id:'10-2',title:'Longitud de la circumferència'},
    {id:'10-3',title:'Àrea dels paral·lelograms'},{id:'10-4',title:'Àrea del triangle'},
    {id:'10-5',title:'Àrea del trapezi'},{id:'10-6',title:"Àrea d'un polígon regular"},
    {id:'10-7',title:'Àrea del cercle'},
  ]},
  {id:11,title:'Funcions',color:'u11',icon:'f(x)',units:[
    {id:'11-1',title:'Coordenades cartesianes'},{id:'11-2',title:'Concepte de funció'},
    {id:'11-3',title:"Expressió d'una funció mitjançant una taula"},{id:'11-4',title:"Expressió d'una funció mitjançant una equació"},
    {id:'11-5',title:"Expressió d'una funció mitjançant una gràfica"},{id:'11-6',title:'Interpretació de gràfiques'},
    {id:'11-7',title:'Funcions de proporcionalitat directa'},
  ]},
  {id:12,title:'Estadística i probabilitat',color:'u12',icon:'📊',units:[
    {id:'12-1',title:'Població i mostra'},{id:'12-2',title:'Variables estadístiques'},
    {id:'12-3',title:'Freqüències. Taules de freqüències'},{id:'12-4',title:'Gràfics estadístics'},
    {id:'12-5',title:'Mesures estadístiques'},{id:'12-6',title:'Experiments aleatoris'},
    {id:'12-7',title:'Probabilitat'},
  ]},
];
const TOTAL_UNITS=CURRICULUM.reduce((s,t)=>s+t.units.length,0);
const COLORS={u1:'#4f6ef7',u2:'#db2777',u3:'#d97706',u4:'#16a34a',u5:'#7c3aed',u6:'#ea580c',u7:'#0284c7',u8:'#a21caf',u9:'#15803d',u10:'#be123c',u11:'#0369a1',u12:'#4d7c0f'};

function getP(){try{return JSON.parse(localStorage.getItem('m1eso')||'{}');}catch(e){return {};}}
function setDone(id,v){const p=getP();p[id]=v;localStorage.setItem('m1eso',JSON.stringify(p));}
function isDone(id){return !!getP()[id];}
function countDone(){return Object.values(getP()).filter(Boolean).length;}

let currentUnit=null,openTopic=null;

function buildSidebar(){
  const nav=document.getElementById('sidebar-nav');
  nav.innerHTML='';
  const p=getP();
  CURRICULUM.forEach(t=>{
    const done=t.units.filter(u=>p[u.id]).length;
    const div=document.createElement('div');
    div.className='unit-item';
    div.innerHTML=`<button class="unit-btn${openTopic===t.id?' active':''}${done===t.units.length?' done':''}" onclick="toggleTopic(${t.id})">
      <span class="unit-num">${done===t.units.length?'✓':t.id}</span>
      <span style="flex:1;">${t.title}</span>
      <span class="unit-progress">${done}/${t.units.length}</span>
    </button>
    <div class="subnav${openTopic===t.id?' open':''}" id="sub-${t.id}">
      ${t.units.map(u=>`<button class="sub-btn${currentUnit===u.id?' active':''}${p[u.id]?' done':''}" onclick="goUnit('${u.id}')">
        <span class="sub-dot"></span>${u.title}</button>`).join('')}
    </div>`;
    nav.appendChild(div);
  });
  updateGP();
}

function toggleTopic(id){openTopic=openTopic===id?null:id;buildSidebar();}

function updateGP(){
  const done=countDone(),pct=Math.round(done/TOTAL_UNITS*100);
  document.getElementById('global-bar').style.width=pct+'%';
  document.getElementById('global-text').textContent=done+' / '+TOTAL_UNITS+' apartats completats';
}

function goHome(){
  currentUnit=null;
  document.getElementById('topbar-info').textContent='📐 Matemàtiques 1r ESO';
  document.getElementById('done-btn').style.display='none';
  buildSidebar();
  renderHome();
}

function goUnit(id){
  currentUnit=id;
  const [tid]=id.split('-');
  openTopic=parseInt(tid);
  buildSidebar();
  const topic=CURRICULUM.find(t=>t.id===parseInt(tid));
  const unit=topic.units.find(u=>u.id===id);
  document.getElementById('topbar-info').textContent='Unitat '+topic.id+'. '+topic.title+' › '+unit.title;
  const db=document.getElementById('done-btn');
  db.style.display='flex';
  db.className='done-btn'+(isDone(id)?' marked':'');
  db.textContent=isDone(id)?'✅ Fet!':'☑ Marcar com a fet';
  renderLesson(id);
}

function toggleDone(){
  if(!currentUnit)return;
  setDone(currentUnit,!isDone(currentUnit));
  const db=document.getElementById('done-btn');
  db.className='done-btn'+(isDone(currentUnit)?' marked':'');
  db.textContent=isDone(currentUnit)?'✅ Fet!':'☑ Marcar com a fet';
  buildSidebar();
}

function renderHome(){
  const done=countDone(),pct=Math.round(done/TOTAL_UNITS*100);
  document.getElementById('content').innerHTML=`<div class="home">
    <div class="home-hero"><h2>Matemàtiques 1r ESO 🎯</h2>
      <p>Selecciona una unitat del menú o clica una targeta per començar. Cada apartat té explicació visual i exercicis interactius.</p>
      <div class="home-stats">
        <div class="stat"><div class="stat-num">${done}</div><div class="stat-label">Apartats fets</div></div>
        <div class="stat"><div class="stat-num">${TOTAL_UNITS-done}</div><div class="stat-label">Pendents</div></div>
        <div class="stat"><div class="stat-num">${pct}%</div><div class="stat-label">Completat</div></div>
      </div>
    </div>
    <div class="units-grid">${CURRICULUM.map(t=>{
      const p=getP(),d=t.units.filter(u=>p[u.id]).length,pt=Math.round(d/t.units.length*100),c=COLORS[t.color];

// Helpers
function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a;}
function lcm(a,b){return Math.abs(a)/gcd(a,b)*Math.abs(b);}
function isPrime(n){if(n<2)return false;for(let i=2;i<=Math.sqrt(n);i++)if(n%i===0)return false;return true;}
function getDivisors(n){const d=[];n=Math.abs(n);for(let i=1;i<=n;i++)if(n%i===0)d.push(i);return d;}
function primeFactors(n){const f={};let d=2;while(n>1){while(n%d===0){f[d]=(f[d]||0)+1;n/=d;}d++;}return f;}
function formatF(f){return Object.entries(f).map(([p,e])=>e>1?`${p}<sup>${e}</sup>`:p).join(' × ');}
function factorStr(n){const f=primeFactors(n);return Object.entries(f).map(([p,e])=>e>1?`${p}^${e}`:p).join(' x ');}
function normF(s){return s.replace(/\s/g,'').toLowerCase().replace(/[×·]/g,'*').replace(/x/g,'*').split('*').sort().join('*');}

function buildExYN(cid,pid,items){
  const st=items.map(e=>({...e,answered:false}));
  document.getElementById(cid).innerHTML=st.map((ex,i)=>`<div class="ex">
    <span class="ex-q">${ex.q}</span>
    <div style="display:flex;gap:8px;">
      <button class="yn-btn" id="${cid}y${i}" onclick="ansYN('${cid}','${pid}',${i},true,${ex.ans})">Sí</button>
      <button class="yn-btn" id="${cid}n${i}" onclick="ansYN('${cid}','${pid}',${i},false,${ex.ans})">No</button>
    </div>
    <span id="${cid}fb${i}"></span>
    ${ex.hint?`<span class="hint-link" onclick="showHint('${cid}',${i},'${ex.hint}')">Pista</span>`:''}
  </div>`).join('');
  document.getElementById(cid)._st=st;updProg(cid,pid);
}
function ansYN(cid,pid,i,ch,ans){
  const st=document.getElementById(cid)._st;if(st[i].answered)return;
  const ok=ch===ans;
  const yb=document.getElementById(cid+'y'+i),nb=document.getElementById(cid+'n'+i);
  const fb=document.getElementById(cid+'fb'+i);
  if(ok){(ch?yb:nb).classList.add('yn-ok');fb.className='fb-ok';fb.textContent='✓ Correcte!';st[i].answered=true;}
  else{(ch?yb:nb).classList.add('yn-wrong');fb.className='fb-wrong';fb.textContent='✗ Torna-ho a provar';setTimeout(()=>{yb.className='yn-btn';nb.className='yn-btn';fb.textContent='';},700);}
  updProg(cid,pid);
}
function showHint(cid,i,hint){const fb=document.getElementById(cid+'fb'+i);fb.style.color='var(--purple)';fb.className='';fb.textContent='Pista: '+hint;}

function buildExNum(cid,pid,items){
  const st=items.map(e=>({...e,answered:false}));
  document.getElementById(cid).innerHTML=st.map((ex,i)=>`<div class="ex">
    <span class="ex-q">${ex.q} =</span>
    <input class="ex-inp" type="number" id="${cid}i${i}" placeholder="?" onkeydown="if(event.key==='Enter')chkNum('${cid}','${pid}',${i},${ex.ans})">
    <button class="check-btn" onclick="chkNum('${cid}','${pid}',${i},${ex.ans})">Comprova</button>
    <span id="${cid}fb${i}"></span>
    ${ex.hint?`<span class="hint-link" onclick="showHint('${cid}',${i},'${ex.hint}')">Pista</span>`:''}
  </div>`).join('');
  document.getElementById(cid)._st=st;updProg(cid,pid);
}
function chkNum(cid,pid,i,ans){
  const inp=document.getElementById(cid+'i'+i),fb=document.getElementById(cid+'fb'+i);
  if(parseInt(inp.value)===ans){fb.className='fb-ok';fb.textContent='✓ Correcte!';inp.disabled=true;document.getElementById(cid)._st[i].answered=true;}
  else{fb.className='fb-wrong';fb.textContent='✗ Torna-ho a provar';inp.value='';inp.focus();}
  updProg(cid,pid);
}
function updProg(cid,pid){
  const st=document.getElementById(cid)?._st||[];
  if(document.getElementById(pid))document.getElementById(pid).textContent=st.filter(e=>e.answered).length+' de '+st.length+' correctes';
}

// Helper fraccions
function mcd2(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a;}
function simplify(n,d){const g=mcd2(Math.abs(n),Math.abs(d));return[n/g,d/g];}
function fracStr(n,d){const [sn,sd]=simplify(n,d);return sd===1?String(sn):`${sn}/${sd}`;}
function renderFrac(n,d,color='var(--accent)'){return `<span style="display:inline-flex;flex-direction:column;align-items:center;gap:0;vertical-align:middle;margin:0 4px;"><span style="font-weight:700;color:${color};font-family:Nunito,sans-serif;font-size:1rem;line-height:1.1;">${n}</span><span style="border-top:2px solid ${color};width:100%;display:block;"></span><span style="font-weight:700;color:${color};font-family:Nunito,sans-serif;font-size:1rem;line-height:1.1;">${d}</span></span>`;}

// Exercici fracció: l'alumne escriu numerador i denominador
function buildExFrac(cid,pid,items){
  const st=items.map(e=>({...e,answered:false}));
  document.getElementById(cid).innerHTML=st.map((ex,i)=>`<div class="ex" style="flex-wrap:wrap;gap:10px;">
    <span class="ex-q" style="min-width:200px;">${ex.q}</span>
    <div style="display:flex;align-items:center;gap:6px;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
        <input class="ex-inp" type="number" id="${cid}n${i}" placeholder="num" style="width:70px;">
        <div style="border-top:2px solid var(--border);width:70px;"></div>
        <input class="ex-inp" type="number" id="${cid}d${i}" placeholder="den" style="width:70px;">
      </div>
      <button class="check-btn" onclick="chkFrac('${cid}','${pid}',${i},${ex.n},${ex.d})">Comprova</button>
      <span id="${cid}fb${i}"></span>
      ${ex.hint?`<span class="hint-link" onclick="showHint('${cid}',${i},'${ex.hint}')">Pista</span>`:''}
    </div>
  </div>`).join('');
  document.getElementById(cid)._st=st;updProg(cid,pid);
}
function chkFrac(cid,pid,i,an,ad){
  const st=document.getElementById(cid)._st;
  if(st[i].answered)return;
  const n=parseInt(document.getElementById(cid+'n'+i).value);
  const d=parseInt(document.getElementById(cid+'d'+i).value);
  if(isNaN(n)||isNaN(d)||d===0){document.getElementById(cid+'fb'+i).className='fb-wrong';document.getElementById(cid+'fb'+i).textContent='✗ Escriu numerador i denominador';return;}
  // check cross multiplication equivalence
  const ok=(n*ad===an*d && d>0);
  const fb=document.getElementById(cid+'fb'+i);
  if(ok){fb.className='fb-ok';fb.textContent='✓ Correcte!';st[i].answered=true;document.getElementById(cid+'n'+i).disabled=true;document.getElementById(cid+'d'+i).disabled=true;}
  else{fb.className='fb-wrong';fb.textContent='✗ Torna-ho a provar';document.getElementById(cid+'n'+i).value='';document.getElementById(cid+'d'+i).value='';}
  updProg(cid,pid);
}

// Exercici comprensió lectora (resposta numèrica)
function buildExCL(cid,pid,items){
  const st=items.map(e=>({...e,answered:false}));
  document.getElementById(cid).innerHTML=st.map((ex,i)=>{
    const ph=ex.ph||'?';
    const fmt=ex.fmt||'';
    return `<div class="ex" style="flex-direction:column;align-items:flex-start;gap:10px;">

      ${ex.isFrac?`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;"><input class="ex-inp" type="number" id="${cid}n${i}" placeholder="num" style="width:70px;"><div style="border-top:2px solid var(--border);width:70px;"></div><input class="ex-inp" type="number" id="${cid}d${i}" placeholder="den" style="width:70px;"></div>
      <button class="check-btn" onclick="chkCLFrac('${cid}','${pid}',${i},${ex.an},${ex.ad})">Comprova</button>`
      :`<div style="display:flex;flex-direction:column;gap:3px;">
        <input class="ex-inp" type="text" id="${cid}i${i}" placeholder="${ph}" style="width:110px;" onkeydown="if(event.key==='Enter')chkCLNum('${cid}','${pid}',${i},${ex.ans})">

      </div>
      <button class="check-btn" onclick="chkCLNum('${cid}','${pid}',${i},${ex.ans})">Comprova</button>`}
      <span id="${cid}fb${i}"></span>
    </div>
    ${ex.hint?`<span class="hint-link" onclick="showHint('${cid}',${i},'${ex.hint}')">Pista</span>`:''}
  </div>`;}).join('');
  document.getElementById(cid)._st=st;updProg(cid,pid);
}
function chkCLNum(cid,pid,i,ans){
  const st=document.getElementById(cid)._st;if(st[i].answered)return;
  const inp=document.getElementById(cid+'i'+i),fb=document.getElementById(cid+'fb'+i);
  const val=parseFloat(inp.value.toString().replace(',','.'));

}

function round2(x){return Math.round(x*100)/100;}
function fmtD(x){return parseFloat(x.toFixed(4)).toString();}

function buildExDec(cid,pid,items){
  const st=items.map(e=>({...e,answered:false}));
  document.getElementById(cid).innerHTML=st.map((ex,i)=>{
    const eg=ex.eg||'ex: 3,75';
    return `<div class="ex" style="flex-wrap:wrap;gap:10px;">
    <span class="ex-q" style="min-width:180px;">${ex.q} =</span>
    <div style="display:flex;flex-direction:column;gap:3px;">
      <input class="ex-inp" type="text" id="${cid}i${i}" placeholder="${eg}" style="width:120px;" onkeydown="if(event.key==='Enter')chkDec('${cid}','${pid}',${i})">
      <span style="font-size:10px;color:var(--text2);">Pots usar coma o punt</span>
    </div>
    <button class="check-btn" onclick="chkDec('${cid}','${pid}',${i})">Comprova</button>
    <span id="${cid}fb${i}"></span>
    ${ex.hint?`<span class="hint-link" onclick="showHint('${cid}',${i},'${ex.hint}')">Pista</span>`:''}
  </div>`;}).join('');
  document.getElementById(cid)._st=st;updProg(cid,pid);
}
function chkDec(cid,pid,i){
  const st=document.getElementById(cid)._st;if(st[i].answered)return;
  const raw=document.getElementById(cid+'i'+i).value.trim().replace(',','.');
  const val=parseFloat(raw);
  const fb=document.getElementById(cid+'fb'+i);
  if(isNaN(val)){fb.className='fb-wrong';fb.textContent='✗ Escriu un número (pots usar coma o punt decimal)';return;}
  const ok=Math.abs(val-st[i].ans)<0.001;
  if(ok){fb.className='fb-ok';fb.textContent='✓ Correcte!';document.getElementById(cid+'i'+i).disabled=true;st[i].answered=true;}
  else{fb.className='fb-wrong';fb.textContent='✗ No és correcte. Prova-ho de nou.';document.getElementById(cid+'i'+i).value='';document.getElementById(cid+'i'+i).focus();}
  updProg(cid,pid);
}

window.g125=function(){
  const items=[];
  for(let i=0;i<6;i++){
    const n=Math.floor(Math.random()*3)*2+5;
    const vals=[...Array(n)].map(()=>Math.floor(Math.random()*10)+1);
    const sorted=[...vals].sort((a,b)=>a-b);
    const sum=vals.reduce((a,b)=>a+b,0);
    const mean=round2(sum/n);
    const med=n%2===0?(sorted[n/2-1]+sorted[n/2])/2:sorted[Math.floor(n/2)];
    const t=Math.floor(Math.random()*3);
    if(t===0)items.push({q:`Dades: {${vals.join(',')}}. Mitjana?`,ans:mean,hint:`Suma=${sum}, N=${n}, mitjana=${mean}`});
    else if(t===1)items.push({q:`Dades ordenades: {${sorted.join(',')}}. Mediana?`,ans:med,hint:`${n} dades: central=${med}`});
    else{
      const mode=vals.reduce((a,v,_,arr)=>arr.filter(x=>x===v).length>arr.filter(x=>x===a).length?v:a,vals[0]);
      items.push({q:`Dades: {${vals.join(',')}}. Moda?`,ans:mode,hint:`El valor que més es repeteix: ${mode}`});
    }
  }
  buildExDec('p125ex','p125pg',items);
};
